# ========================
# Basic App Config
# ========================
spring.application.name=api-gateway
server.port=8080
# ========================
# Eureka
# ========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# ========================
# SWAGGER DOC ROUTES (IMPORTANT: KEEP FIRST)
# ========================
# USER DOCS
spring.cloud.gateway.routes[0].id=user-docs
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/v3/api-docs
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/users/v3/api-docs, /v3/api-docs
# AI DOCS
spring.cloud.gateway.routes[1].id=ai-docs
spring.cloud.gateway.routes[1].uri=lb://AI-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/recommendation/v3/api-docs
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/recommendation/v3/api-docs, /v3/api-docs
# ACTIVITY DOCS
spring.cloud.gateway.routes[2].id=activity-docs
spring.cloud.gateway.routes[2].uri=lb://ACTIVITY-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/activities/v3/api-docs
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/activities/v3/api-docs, /v3/api-docs
# ========================
# NORMAL SERVICE ROUTES
# ========================
# USER SERVICE
spring.cloud.gateway.routes[3].id=user-service
spring.cloud.gateway.routes[3].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/users/**
# AI SERVICE
spring.cloud.gateway.routes[4].id=ai-service
spring.cloud.gateway.routes[4].uri=lb://AI-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/recommendation/**
# ACTIVITY SERVICE
spring.cloud.gateway.routes[5].id=activity-service
spring.cloud.gateway.routes[5].uri=lb://ACTIVITY-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/activities/**
# ========================
# Swagger Aggregation UI
# ========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/api/users/v3/api-docs
springdoc.swagger-ui.urls[1].name=AI Service
springdoc.swagger-ui.urls[1].url=/api/recommendation/v3/api-docs
springdoc.swagger-ui.urls[2].name=Activity Service
springdoc.swagger-ui.urls[2].url=/api/activities/v3/api-docs
# ========================
# CORS (for Swagger)
# ========================
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
# ========================
# Debug (optional)
# ========================
logging.level.org.springframework.cloud.gateway=INFO
management.endpoints.web.exposure.include=*
management.endpoint.gateway.enabled=true